services:
  - type: web
    name: ai-therapist-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: sh -c "uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: TRANSFORMERS_CACHE
        value: /opt/render/project/cache

      - key: HF_HOME
        value: /opt/render/project/cache


